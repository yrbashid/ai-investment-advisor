name: Weekly Market Research

on:
  schedule:
    # Every Sunday at 8am ET (1pm UTC)
    - cron: "0 13 * * 0"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly research
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python market_research.py

      - name: Commit research data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weekly/ data/tracking/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "📊 Weekly research — $(date +%Y-%m-%d)"
          # Rebase onto any commits that landed while we ran, then push.
          # Retry once if a concurrent push beats us.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME:-main}" && git push && exit 0
            echo "Push attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "Failed to push after 3 attempts"
          exit 1
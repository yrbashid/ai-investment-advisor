name: Monthly Recommendations

on:
  schedule:
    # 1st of every month at 9am ET (2pm UTC)
    - cron: "0 14 1 * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  recommend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate monthly recommendations
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd src
          python generate_recs.py

      - name: Send email report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          cd src
          python send_report.py

      - name: Commit recommendation data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monthly/
          git diff --staged --quiet || git commit -m "📈 Monthly recommendations — $(date +%Y-%m)"
          git push --force
